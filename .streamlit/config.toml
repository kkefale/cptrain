[theme]
base                  = "dark"
primaryColor          = "#0EA5E9"
backgroundColor       = "#0F172A"
secondaryBackgroundColor = "#1E293B"
textColor             = "#E2E8F0"
font                  = "sans serif"

[server]
headless              = true
enableCORS            = false
enableXsrfProtection  = true

[browser]
gatherUsageStats      = false
